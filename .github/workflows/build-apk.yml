name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build Android APK locally
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java SDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Expo Android project
        run: npx expo prebuild -p android --clean

      - name: Build APK with Gradle
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk MacroTracker.apk

      - name: Get release name
        id: release_name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_name.outputs.name }}
          name: MacroTracker ${{ steps.release_name.outputs.name }}
          body: |
            ## 📱 MacroTracker ${{ steps.release_name.outputs.name }}

            ### Installation
            1. Download `MacroTracker.apk` below
            2. On your Android device, enable **Install unknown apps** in Settings
            3. Open the downloaded APK and tap **Install**

            ### What's included
            - Daily calorie & protein tracking
            - **NEW:** AI Nutrition Label Scanner (Camera & Gallery)
            - 7-day history & stats
            - Animated UI with dark theme
            - Persistent local storage
          files: MacroTracker.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
